<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Consultez vos fiches sauvegardées hors ligne – Bourses & Concours Congo">
    <title>Mes fiches sauvegardées – Bourses Congo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f5b042'%3E%3Cpath d='M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z'/%3E%3C/svg%3E">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <i class="fas fa-star header-icon"></i>
                <div>
                    <h1>Mes fiches sauvegardées</h1>
                    <p class="sous-titre">Consultables même sans connexion internet</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="saved-list" class="saved-container">
            <div class="loading-state">
                <i class="fas fa-spinner fa-pulse"></i> Chargement...
            </div>
        </div>
        <div class="retour-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Retour au calendrier</a>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-links">
                <a href="soumettre.html"><i class="fas fa-bullhorn"></i> Partager</a>
                <a href="mes-fiches.html"><i class="fas fa-save"></i> Mes fiches</a>
                <a href="apropos.html"><i class="fas fa-info-circle"></i> À propos</a>
                <a href="https://wa.me/242064426075" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            </div>
            <p class="copyright">© 2026 · Projet communautaire congolais</p>
        </div>
    </footer>

    <a href="https://wa.me/242064426075?text=Bonjour%2C%20je%20consulte%20le%20site%20Bourses%20Congo" class="float-wa" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i> Nous contacter
    </a>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function afficherSauvegardes() {
            const container = document.getElementById('saved-list');
            const saved = JSON.parse(localStorage.getItem('bourses_saved')) || [];

            if (saved.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>Aucune fiche sauvegardée pour le moment.</p>
                        <p>Utilisez le bouton <i class="fas fa-save"></i> Sauvegarder sur une fiche pour la retrouver ici, même hors ligne.</p>
                    </div>
                `;
                return;
            }

            let html = '<ul class="saved-ul">';
            saved.forEach((item, index) => {
                // Support des anciennes sauvegardes (avec 'date') et des nouvelles (avec 'annee')
                const anneeAffichage = item.annee || item.date || '2025-2026';
                const conditionsAffichage = item.conditions || 'Consultez la fiche originale pour plus de détails.';
                
                html += `
                    <li class="saved-item">
                        <div class="saved-header">
                            <i class="fas fa-file-alt"></i>
                            <strong>${escapeHtml(item.titre)}</strong>
                        </div>
                        <div class="saved-detail">
                            <i class="fas fa-calendar-alt"></i> Année universitaire : ${escapeHtml(anneeAffichage)}
                        </div>
                        <div class="saved-detail">
                            <i class="fas fa-clipboard-list"></i> Conditions : ${escapeHtml(conditionsAffichage)}
                        </div>
                        <div class="saved-actions">
                            <a href="${item.url}" target="_blank" class="btn-link"><i class="fas fa-external-link-alt"></i> Ouvrir la fiche originale (nécessite internet)</a>
                            <button class="btn-delete" data-index="${index}"><i class="fas fa-trash-alt"></i> Supprimer</button>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    let saved = JSON.parse(localStorage.getItem('bourses_saved')) || [];
                    saved.splice(idx, 1);
                    localStorage.setItem('bourses_saved', JSON.stringify(saved));
                    afficherSauvegardes();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', afficherSauvegardes);
    </script>
</body>
</html>
