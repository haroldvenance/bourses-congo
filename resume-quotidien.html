<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résumé quotidien – usage interne</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><h1>📋 Résumé à copier pour WhatsApp</h1></header>
    <main>
        <textarea id="message" rows="10" cols="60" style="width:100%; font-family:monospace;"></textarea>
        <button id="copyBtn">Copier le message</button>
        <p><a href="index.html">Retour</a></p>
    </main>
    <script>
        // Récupère les événements du même tableau que main.js
        // (pour ne pas dupliquer, on pourrait charger main.js, mais on va redéfinir un petit tableau ou utiliser localStorage)
        // Solution simple : inclure les événements manuellement ou les récupérer via fetch.
        // Pour l'instant, on recopie les événements depuis main.js (vous devrez synchroniser)
        const evenements = [
            { titre: "Bourse Ambassade de France", date: "2026-04-30", region: "National", urlFiche: "fiches/bourse-ambassade-france.html" },
            { titre: "Concours ENSP Brazzaville", date: "2026-05-15", region: "Brazzaville", urlFiche: "fiches/concours-ensp-brazzaville.html" },
            { titre: "Bourse Congo Pétrole", date: "2026-06-10", region: "Pointe-Noire", urlFiche: "fiches/bourse-congo-petrole.html" }
        ];
        
        function genererResume() {
            const aujourdhui = new Date();
            const dans3Jours = new Date(); dans3Jours.setDate(aujourdhui.getDate() + 3);
            const dans7Jours = new Date(); dans7Jours.setDate(aujourdhui.getDate() + 7);
            
            const aVenir = evenements.filter(ev => new Date(ev.date) > aujourdhui);
            aVenir.sort((a,b) => new Date(a.date) - new Date(b.date));
            
            let message = "📅 *RÉSUMÉ BOURSES & CONCOURS CONGO*\n";
            message += `🗓️ ${aujourdhui.toLocaleDateString('fr-FR')}\n\n`;
            
            // Échéances dans les 3 jours
            const urgent = aVenir.filter(ev => new Date(ev.date) <= dans3Jours);
            if (urgent.length) {
                message += "⚠️ *DANS LES 3 JOURS :*\n";
                urgent.forEach(ev => {
                    message += `🔜 ${ev.titre} (${ev.region}) – ${new Date(ev.date).toLocaleDateString('fr-FR')}\n   ${window.location.origin}${ev.urlFiche}\n`;
                });
                message += "\n";
            }
            
            // Échéances dans les 7 jours (sauf urgent)
            const prochain = aVenir.filter(ev => new Date(ev.date) > dans3Jours && new Date(ev.date) <= dans7Jours);
            if (prochain.length) {
                message += "📌 *À VENIR DANS LES 7 JOURS :*\n";
                prochain.forEach(ev => {
                    message += `📅 ${ev.titre} (${ev.region}) – ${new Date(ev.date).toLocaleDateString('fr-FR')}\n   ${window.location.origin}${ev.urlFiche}\n`;
                });
                message += "\n";
            }
            
            message += "🔗 *Calendrier complet :* " + window.location.origin + "/index.html\n";
            message += "📢 *Soumettre une info :* " + window.location.origin + "/soumettre.html\n";
            message += "\n_Message automatique – vérifiez les dates sur les liens officiels._";
            
            return message;
        }
        
        const textarea = document.getElementById('message');
        textarea.value = genererResume();
        document.getElementById('copyBtn').addEventListener('click', () => {
            textarea.select();
            document.execCommand('copy');
            alert('Message copié ! Collez-le dans votre canal WhatsApp.');
        });
    </script>
</body>
</html>
