<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Calendrier des bourses et concours en République du Congo. Filtre par région, fiches détaillées, sauvegarde hors ligne.">
    <title>Bourses & Concours Congo – Calendrier</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
</head>
<body>
    <header>
        <h1>📅 Bourses & Concours Congo</h1>
        <p class="sous-titre">Calendrier des échéances – mises à jour régulières</p>
    </header>

    <main>
        <div class="filtre-region">
            <label>🌍 Filtrer par région :</label>
            <select id="region-select">
                <option value="all">Toutes les régions</option>
                <option value="Brazzaville">Brazzaville</option>
                <option value="Pointe-Noire">Pointe-Noire</option>
                <option value="Dolisie">Dolisie</option>
                <option value="National">National</option>
            </select>
        </div>

        <div class="table-container">
            <table id="calendrier-table">
                <thead>
                    <tr>
                        <th>Date limite</th>
                        <th>Événement</th>
                        <th>Région</th>
                        <th>Lien fiche</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Les lignes seront générées en JavaScript à partir d'un tableau d'objets -->
                </tbody>
            </table>
        </div>

        <div class="info-sauvegarde">
            <p>💾 <a href="mes-fiches.html">Voir mes fiches sauvegardées</a> (consultables hors ligne)</p>
        </div>
		
		
    </main>

	<footer>
		<p>📢 <a href="soumettre.html">Partager</a> | 💾 <a href="mes-fiches.html">Mes fiches</a> | <a href="apropos.html">À propos</a></p>
		<p>📱 <a href="https://wa.me/242064426075" target="_blank">WhatsApp</a></p>
		<p>© 2026 · Projet communautaire</p>
	</footer>

    <script src="js/main.js"></script>
</body>
</html>
