<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Calendrier des bourses et concours en République du Congo. Filtre par région, fiches détaillées, sauvegarde hors ligne.">
    <title>Bourses & Concours Congo – Calendrier</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231e3a5f'%3E%3Cpath d='M8 7V3m8 4V3M5 11h14M5 19h14M7 21h10M5 7h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z' stroke='%231e3a5f' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <i class="fas fa-calendar-alt header-icon"></i>
                <div>
                    <h1>Bourses & Concours Congo</h1>
                    <p class="sous-titre">Calendrier des échéances – mises à jour régulières</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="filtre-region">
            <label><i class="fas fa-globe"></i> Filtrer par région :</label>
            <select id="region-select" class="region-select">
                <option value="all">Toutes les régions</option>
                <option value="Brazzaville">Brazzaville</option>
                <option value="Pointe-Noire">Pointe-Noire</option>
                <option value="Dolisie">Dolisie</option>
                <option value="National">National</option>
            </select>
        </div>

        <div class="table-container">
            <table id="calendrier-table" class="calendrier-table">
                <thead>
                    <tr>
                        <th><i class="fas fa-calendar-week"></i> Date limite</th>
                        <th><i class="fas fa-graduation-cap"></i> Événement</th>
                        <th><i class="fas fa-location-dot"></i> Région</th>
                        <th><i class="fas fa-file-alt"></i> Fiche</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rempli par JS -->
                </tbody>
            </table>
        </div>

        <div class="info-sauvegarde">
            <i class="fas fa-save"></i> <a href="mes-fiches.html">Voir mes fiches sauvegardées</a> <span class="badge">hors ligne</span>
        </div>

        <!-- WhatsApp flottant -->
        <a href="https://wa.me/242064426075?text=Bonjour%2C%20j%27ai%20une%20question%20sur%20les%20bourses%20Congo" class="float-wa" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-whatsapp"></i> Nous contacter
        </a>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-links">
                <a href="soumettre.html"><i class="fas fa-bullhorn"></i> Partager</a>
                <a href="mes-fiches.html"><i class="fas fa-save"></i> Mes fiches</a>
                <a href="apropos.html"><i class="fas fa-info-circle"></i> À propos</a>
                <a href="https://wa.me/242064426075" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            </div>
            <p class="copyright">© 2026 · Projet communautaire congolais</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
